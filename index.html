<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BNO Absence Planner — Rolling 180 Days</title>
  <!-- Flatpickr CDN -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 10px; line-height: 1.5; }
    h1, h2 { text-align: center; }
    #controls, #add-trip { margin: 20px 0; padding: 15px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; }
    button { padding: 8px 16px; margin: 5px; cursor: pointer; }
    input, textarea { padding: 8px; width: calc(100% - 20px); margin: 5px 0; }
    table { width: 100%; border-collapse: collapse; margin: 20px 0; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #e9ecef; }
    .danger { color: red; font-weight: bold; background: #ffebee; padding: 10px; border-radius: 4px; }
    .safe { color: green; font-weight: bold; background: #e8f5e9; padding: 10px; border-radius: 4px; }
    #result { font-size: 1.3em; margin: 20px 0; text-align: center; }
    .flatpickr-input { width: 48%; display: inline-block; }
    small { color: #666; }
  </style>
</head>
<body>

<h1>BNO / ILR Absence Planner<br>(Rolling max 180 days absent in any 12 months)</h1>

<div id="controls">
  <p><strong>1.</strong> Upload your existing <code>trips.json</code> (or start fresh)</p>
  <input type="file" id="fileInput" accept=".json" />
  <button onclick="loadJson()">Load JSON</button>
  <button onclick="downloadJson()">Download updated JSON</button>
  <button onclick="resetData()">Reset / Start New</button>
</div>

<div id="add-trip">
  <h2>Add / Plan a New Trip</h2>
  <label>Departure: <input type="text" id="depart" class="flatpickr-input" placeholder="Select departure date" /></label>
  <label>Return: <input type="text" id="return" class="flatpickr-input" placeholder="Select return date" /></label><br>
  <label>Notes (optional): <input type="text" id="notes" placeholder="e.g. HK family visit" style="width: 60%;" /></label><br>
  <button onclick="addTrip()">Add Trip</button>
</div>

<h2>Current Absences (including pre-entry)</h2>
<table id="tripTable">
  <thead>
    <tr><th>Depart</th><th>Return</th><th>Days</th><th>Notes</th><th>Action</th></tr>
  </thead>
  <tbody></tbody>
</table>

<div id="result">Load or add trips, then click "Calculate" below ↓</div>
<button onclick="calculate()" style="display:block; margin:20px auto; font-size:1.1em; padding:12px 30px;">Calculate Rolling Absences</button>

<textarea id="jsonView" rows="8" style="width:100%; font-family:monospace; display:none;"></textarea>

<script>
// Global state
let data = {
  grantDate: "2026-02-16",
  ukEntryDate: "2026-06-10",
  trips: []  // user-added only; pre-entry computed separately
};

const departPicker = flatpickr("#depart", {
  dateFormat: "Y-m-d",
  minDate: data.grantDate,
  onChange: function(selectedDates, dateStr) {
    returnPicker.set("minDate", dateStr);
  }
});

const returnPicker = flatpickr("#return", {
  dateFormat: "Y-m-d",
  minDate: data.grantDate
});

// Load JSON from file
function loadJson() {
  const file = document.getElementById("fileInput").files[0];
  if (!file) return alert("Select trips.json first");
  const reader = new FileReader();
  reader.onload = e => {
    try {
      data = JSON.parse(e.target.result);
      if (!data.grantDate || !data.ukEntryDate) throw new Error("Missing grantDate or ukEntryDate");
      updateView();
      alert("Loaded successfully!");
    } catch(err) {
      alert("Invalid JSON:\n" + err.message);
    }
  };
  reader.readAsText(file);
}

// Reset to defaults
function resetData() {
  if (!confirm("Clear everything and start fresh?")) return;
  data = { grantDate: "2026-02-16", ukEntryDate: "2026-06-10", trips: [] };
  updateView();
}

// Add new trip
function addTrip() {
  const depart = document.getElementById("depart").value;
  const ret = document.getElementById("return").value;
  const notes = document.getElementById("notes").value.trim();

  if (!depart || !ret) return alert("Select both departure and return dates");
  if (new Date(depart) > new Date(ret)) return alert("Return must be after departure");

  data.trips.push({ depart, return: ret, notes });
  updateView();
  // Clear form
  document.getElementById("depart").value = "";
  document.getElementById("return").value = "";
  document.getElementById("notes").value = "";
}

// Update table + textarea view
function updateView() {
  const tbody = document.querySelector("#tripTable tbody");
  tbody.innerHTML = "";

  // Pre-entry row
  const preStart = data.grantDate;
  const preEndObj = new Date(data.ukEntryDate);
  preEndObj.setDate(preEndObj.getDate() - 1);
  const preEnd = preEndObj.toISOString().split("T")[0];
  const preDays = daysBetween(new Date(preStart), new Date(preEnd));
  let row = document.createElement("tr");
  row.innerHTML = `<td>${preStart}</td><td>${preEnd}</td><td>${preDays}</td><td>Pre-entry (auto)</td><td>—</td>`;
  tbody.appendChild(row);

  // User trips
  data.trips.forEach((t, i) => {
    const days = daysBetween(new Date(t.depart), new Date(t.return));
    row = document.createElement("tr");
    row.innerHTML = `
      <td>${t.depart}</td>
      <td>${t.return}</td>
      <td>${days}</td>
      <td>${t.notes || ""}</td>
      <td><button onclick="deleteTrip(${i})">Delete</button></td>`;
    tbody.appendChild(row);
  });

  document.getElementById("jsonView").value = JSON.stringify(data, null, 2);
}

// Delete trip
function deleteTrip(index) {
  if (confirm("Delete this trip?")) {
    data.trips.splice(index, 1);
    updateView();
  }
}

// Days between inclusive
function daysBetween(d1, d2) {
  const diff = Math.abs(d2 - d1);
  return Math.floor(diff / (1000*60*60*24)) + 1;
}

// Core rolling calculation
function calculate() {
  const periods = [];

  // Pre-entry
  const preEndObj = new Date(data.ukEntryDate);
  preEndObj.setDate(preEndObj.getDate() - 1);
  periods.push({
    start: new Date(data.grantDate),
    end: preEndObj,
    days: daysBetween(new Date(data.grantDate), preEndObj),
    notes: "Pre-entry"
  });

  // User trips
  data.trips.forEach(t => {
    periods.push({
      start: new Date(t.depart),
      end: new Date(t.return),
      days: daysBetween(new Date(t.depart), new Date(t.return)),
      notes: t.notes
    });
  });

  if (periods.length === 0) {
    document.getElementById("result").innerHTML = "No absences yet — all good!";
    return;
  }

  let maxAbs = 0;
  let start = new Date(Math.min(...periods.map(p => p.start)));
  start.setFullYear(start.getFullYear() - 1);
  let end = new Date(Math.max(...periods.map(p => p.end)));
  end.setFullYear(end.getFullYear() + 1);

  let current = new Date(start);
  while (current <= end) {
    const wStart = new Date(current);
    const wEnd = new Date(current);
    wEnd.setDate(wEnd.getDate() + 364);

    let sum = 0;
    periods.forEach(p => {
      const oStart = p.start > wStart ? p.start : wStart;
      const oEnd = p.end < wEnd ? p.end : wEnd;
      if (oStart <= oEnd) {
        sum += daysBetween(oStart, oEnd);
      }
    });

    if (sum > maxAbs) maxAbs = sum;
    current.setDate(current.getDate() + 1);
  }

  const status = maxAbs <= 180
    ? `<div class="safe">SAFE — Max in any rolling 365-day window: ${maxAbs} days (≤180) ✓<br>Buffer: ${180 - maxAbs} days left</div>`
    : `<div class="danger">OVER LIMIT — Max: ${maxAbs} days (${maxAbs - 180} over)!<br>Review trips — may affect ILR continuous residence.</div>`;

  document.getElementById("result").innerHTML = status;
}

// Download current JSON
function downloadJson() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "trips.json";
  a.click();
  URL.revokeObjectURL(url);
}

// Init
updateView();
</script>

</body>
</html>
