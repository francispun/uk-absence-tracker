<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🇬🇧</text></svg>">
  <title>BNO Planner — ILR + Citizenship (Shortest Route)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <style>
    body { font-family: Arial, sans-serif; max-width: 1000px; margin: 20px auto; padding: 20px; line-height: 1.6; }
    h1 { text-align: center; color: #1a5276; }
    .box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 20px 0; border: 1px solid #ddd; }
    button { padding: 10px 20px; margin: 5px; cursor: pointer; font-size: 1em; }
    table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
    th { background: #e9ecef; }
    .safe { color: green; font-weight: bold; background: #e8f5e9; padding: 12px; border-radius: 6px; }
    .danger { color: red; font-weight: bold; background: #ffebee; padding: 12px; border-radius: 6px; }
    #status { text-align: center; font-style: italic; color: #555; }
    .flatpickr-input { width: 48%; }
  </style>
</head>
<body>

<h1>BNO Absence Planner<br>ILR (Rolling 180) + Citizenship (450/90 days — shortest route)</h1>

<div id="status">Loading trips.json automatically...</div>

<div class="box">
  <h2>Add / Plan a Trip (calendar)</h2>
  Departure: <input type="text" id="depart" class="flatpickr-input" placeholder="Pick date" />
  Return:    <input type="text" id="return" class="flatpickr-input" placeholder="Pick date" /><br>
  Notes:     <input type="text" id="notes" placeholder="e.g. Family visit HK" style="width:60%;" />
  <button onclick="addTrip()">Add Trip</button>
</div>

<h2>Absences (Pre-entry auto + your trips)</h2>
<table id="tripTable">
  <thead><tr><th>Depart</th><th>Return</th><th>Days</th><th>Notes</th><th>Action</th></tr></thead>
  <tbody></tbody>
</table>

<div class="box">
  <button onclick="calculate()" style="font-size:1.2em; padding:15px 30px;">Calculate — Check ILR & Citizenship Safety</button>
</div>

<div id="result"></div>

<button onclick="downloadJson()">Download updated trips.json (save to GitHub)</button>
<button onclick="resetData()">Reset everything</button>

<script>
// ====================== CONFIG ======================
let data = {
  grantDate: "2026-02-16",
  ukEntryDate: "2026-06-10",
  trips: []
};

// Auto-set citizenship application date (shortest route: 5 years + 1 year ILR)
const citizenshipAppDate = new Date(data.grantDate);
citizenshipAppDate.setFullYear(citizenshipAppDate.getFullYear() + 6); // 16 Feb 2032

// Flatpickr calendars
flatpickr("#depart", { dateFormat: "Y-m-d", minDate: data.grantDate, onChange: (_, str) => returnPicker.set("minDate", str) });
const returnPicker = flatpickr("#return", { dateFormat: "Y-m-d", minDate: data.grantDate });

// ====================== AUTO-LOAD trips.json ======================
async function loadAuto() {
  try {
    const res = await fetch('trips.json');
    if (!res.ok) throw new Error();
    data = await res.json();
    document.getElementById('status').innerHTML = '✅ trips.json loaded automatically';
  } catch {
    document.getElementById('status').innerHTML = '⚠️ No trips.json found yet — using defaults. Add trips and download.';
  }
  updateView();
}
window.addEventListener('load', loadAuto);

// ====================== CORE FUNCTIONS ======================
function daysBetween(d1, d2) {
  return Math.floor(Math.abs(d2 - d1) / (1000*60*60*24)) + 1;
}

function updateView() {
  const tbody = document.querySelector("#tripTable tbody");
  tbody.innerHTML = "";

  // Pre-entry
  const preEnd = new Date(data.ukEntryDate);
  preEnd.setDate(preEnd.getDate() - 1);
  const preDays = daysBetween(new Date(data.grantDate), preEnd);
  let row = document.createElement("tr");
  row.innerHTML = `<td>${data.grantDate}</td><td>${preEnd.toISOString().split('T')[0]}</td><td>${preDays}</td><td>Pre-entry (auto)</td><td>—</td>`;
  tbody.appendChild(row);

  // User trips
  data.trips.forEach((t, i) => {
    const days = daysBetween(new Date(t.depart), new Date(t.return));
    row = document.createElement("tr");
    row.innerHTML = `
      <td>${t.depart}</td><td>${t.return}</td><td>${days}</td><td>${t.notes||''}</td>
      <td><button onclick="deleteTrip(${i})">Delete</button></td>`;
    tbody.appendChild(row);
  });
}

function addTrip() {
  const depart = document.getElementById("depart").value;
  const ret = document.getElementById("return").value;
  const notes = document.getElementById("notes").value.trim();
  if (!depart || !ret) return alert("Please pick both dates");
  data.trips.push({depart, return: ret, notes});
  updateView();
  document.getElementById("depart").value = "";
  document.getElementById("return").value = "";
  document.getElementById("notes").value = "";
}

function deleteTrip(i) {
  if (confirm("Delete this trip?")) {
    data.trips.splice(i, 1);
    updateView();
  }
}

function downloadJson() {
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: "application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "trips.json";
  a.click();
}

// ====================== CALCULATION ======================
function calculate() {
  const periods = [];
  // Pre-entry
  const preEnd = new Date(data.ukEntryDate); preEnd.setDate(preEnd.getDate()-1);
  periods.push({start: new Date(data.grantDate), end: preEnd});

  data.trips.forEach(t => {
    periods.push({start: new Date(t.depart), end: new Date(t.return)});
  });

  // ILR rolling 180
  let maxRolling = 0;
  let startDate = new Date(Math.min(...periods.map(p => p.start)));
  startDate.setFullYear(startDate.getFullYear() - 1);
  let endDate = new Date(Math.max(...periods.map(p => p.end)));
  endDate.setFullYear(endDate.getFullYear() + 1);

  let current = new Date(startDate);
  while (current <= endDate) {
    const wEnd = new Date(current); wEnd.setDate(wEnd.getDate() + 364);
    let sum = 0;
    periods.forEach(p => {
      const oStart = Math.max(p.start, current);
      const oEnd = Math.min(p.end, wEnd);
      if (oStart <= oEnd) sum += daysBetween(oStart, oEnd);
    });
    if (sum > maxRolling) maxRolling = sum;
    current.setDate(current.getDate() + 1);
  }

  // Citizenship (fixed 5 years before 2032-02-16)
  const citApp = citizenshipAppDate;
  const fiveYearsBefore = new Date(citApp); fiveYearsBefore.setFullYear(fiveYearsBefore.getFullYear() - 5);
  const twelveMonthsBefore = new Date(citApp); twelveMonthsBefore.setFullYear(twelveMonthsBefore.getFullYear() - 1);

  let total5yr = 0, final12m = 0;
  periods.forEach(p => {
    const o5 = Math.max(p.start, fiveYearsBefore);
    const o5e = Math.min(p.end, citApp);
    if (o5 <= o5e) total5yr += daysBetween(o5, o5e);

    const o12 = Math.max(p.start, twelveMonthsBefore);
    const o12e = Math.min(p.end, citApp);
    if (o12 <= o12e) final12m += daysBetween(o12, o12e);
  });

  // Result
  let html = `<div class="safe"><strong>ILR (Rolling 180):</strong> Max in any 12-month window = ${maxRolling} days<br>`;
  html += maxRolling <= 180 ? "✅ SAFE for ILR" : "❌ OVER LIMIT — fix trips";
  html += `</div><br><div class="${total5yr <= 450 && final12m <= 90 ? 'safe' : 'danger'}">`;
  html += `<strong>Citizenship (apply Feb 2032):</strong><br>`;
  html += `Total in 5 years before application: ${total5yr} days (limit 450)<br>`;
  html += `Final 12 months: ${final12m} days (limit 90)<br>`;
  html += (total5yr <= 450 && final12m <= 90) ? "✅ SAFE for British citizenship" : "❌ RISK — may lose citizenship eligibility (discretion possible but not guaranteed)";
  html += `</div>`;

  document.getElementById("result").innerHTML = html;
}

function resetData() {
  if (confirm("Reset everything?")) {
    data.trips = [];
    updateView();
    calculate();
  }
}
</script>

</body>
</html>
